apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: student-feedback-ingress
  namespace: student-feedback
spec:
  ingressClassName: nginx
  rules:
  - host: student-feedback.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80